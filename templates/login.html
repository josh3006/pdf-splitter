<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login - PDF Splitter</title>
  <style>
    :root {
      --bg: #f6f8fb;
      --card-bg: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #e5e7eb;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --shadow: 0 14px 34px rgba(2, 6, 23, 0.10);
      --radius: 14px;
    }

    * { box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans";
      margin: 0;
      min-height: 100vh; display:flex; align-items:center; justify-content:center;
      background: radial-gradient(1200px 600px at 10% 10%, #eef2ff 0%, transparent 60%),
                  radial-gradient(1200px 600px at 90% 20%, #e0f2fe 0%, transparent 60%),
                  linear-gradient(180deg, #f8fafc 0%, var(--bg) 100%);
      color: var(--text);
      padding: 1.5rem;
    }

    .card { width: 100%; max-width: 440px; margin: 2rem auto; padding: 2rem 1.75rem; border: 1px solid var(--border); border-radius: var(--radius); background: var(--card-bg); box-shadow: var(--shadow); }
    h2 { margin-top: 0; margin-bottom: 1rem; letter-spacing: .2px; }

    .field { margin-bottom: 1rem; }
    label { display: block; margin-bottom: 0.4rem; font-weight: 600; }

    input[type="text"], input[type="password"] {
      width: 100%; padding: 0.7rem 0.75rem; border: 1px solid var(--border); border-radius: 10px; background: #fff;
      transition: border-color .15s ease, box-shadow .15s ease;
    }
    input[type="text"]:focus, input[type="password"]:focus { outline:none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,.15); }

    .btn { display:inline-block; padding: 0.65rem 1rem; border-radius: 10px; border: 1px solid transparent; cursor:pointer; background: var(--accent); color:#fff; font-weight: 600; letter-spacing:.2px; box-shadow: 0 6px 18px rgba(37, 99, 235, 0.22); transition: transform .08s ease, background .15s ease, box-shadow .15s ease; }
    .btn:hover { background: var(--accent-hover); transform: translateY(-1px); }
    .btn:active { transform: translateY(0); box-shadow: 0 4px 12px rgba(37, 99, 235, 0.25); }

    .alert { margin-bottom: 1rem; padding: .75rem .9rem; border-radius: 10px; font-weight: 600; color: #991b1b; background: #fee2e2; border: 1px solid #fecaca; box-shadow: 0 4px 12px rgba(220, 38, 38, 0.06); }

    p.help { margin-top:1rem; color: var(--muted); }
  </style>
</head>
<body>
  <div class="card">
    <h2>Login</h2>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="post">
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required autofocus>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required>
      </div>
      <button class="btn" type="submit">Login</button>
    </form>

    <p style="margin-top:1rem; color:#555;">Default: admin / password123</p>
  </div>
</body>
</html>
